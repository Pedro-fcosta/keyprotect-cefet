{% extends "base.html" %}

{% block title %}Cadastrar chave | Guardião de Chaves{% endblock %}

{% block content %}

<section class="titulo-pagina">
    <h2>Cadastrar chave</h2>
    <p>Inclua uma nova chave no sistema. O código será gerado automaticamente após o cadastro.</p>
</section>

<section class="form-box">
    <form method="POST">

        <div class="campo">
            <label for="local">Local/Sala</label>
            <input type="text" id="local" name="local" placeholder="Ex: Laboratório de Mecânica" required>
        </div>

        <div class="campo">
            <label for="descricao">Descrição/observação</label>
            <textarea id="descricao" name="descricao" placeholder="Ex: Chave da sala principal, armário ou laboratório..."></textarea>
        </div>

        <div class="botoes">
            <button type="submit" class="btn btn-principal">Cadastrar chave</button>
            <a href="{{ url_for('chaves') }}" class="btn btn-secundario">Voltar</a>
        </div>

    </form>
</section>

{% endblock %}
