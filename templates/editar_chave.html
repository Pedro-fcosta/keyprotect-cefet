{% extends "base.html" %}

{% block title %}Editar chave | KeyProtect{% endblock %}

{% block content %}

<section class="titulo-pagina">
    <h2>Editar chave</h2>
    <p>Atualize as informações da chave cadastrada.</p>
</section>

<section class="form-box form-chave-box">

    <form method="POST">
        
        <input type="hidden" name="status" value="{{ chave.status }}">
        
        <div class="form-grid form-grid-chave">

            <div class="campo-form">
                <label for="codigo">Código da chave</label>
                <input 
                    type="text" 
                    id="codigo" 
                    name="codigo" 
                    value="{{ chave.codigo }}" 
                    readonly
                >
            </div>

            <div class="campo-form">
                <label for="local">Local / Sala</label>
                <input 
                    type="text" 
                    id="local" 
                    name="local" 
                    value="{{ chave.local }}" 
                    placeholder="Ex: Sala 201, Laboratório de Mecânica..."
                    required
                >
            </div>

            <div class="campo-form">
                <label for="tipo">Tipo de ambiente</label>
                <select id="tipo" name="tipo" required>
                    <option value="">Selecione o tipo</option>

                    <option value="sala_aula" {% if chave.tipo == "sala_aula" %}selected{% endif %}>
                        Sala de aula
                    </option>

                    <option value="laboratorio" {% if chave.tipo == "laboratorio" %}selected{% endif %}>
                        Laboratório
                    </option>

                    <option value="administrativo" {% if chave.tipo == "administrativo" %}selected{% endif %}>
                        Administrativo
                    </option>
                </select>
            </div>

            <div class="campo-form">
                <label for="andar">Andar</label>
                <select id="andar" name="andar">
                    <option value="" {% if not chave.andar %}selected{% endif %}>
                        Não se aplica
                    </option>

                    <option value="1" {% if chave.andar == 1 or chave.andar == "1" %}selected{% endif %}>
                        1º andar
                    </option>

                    <option value="2" {% if chave.andar == 2 or chave.andar == "2" %}selected{% endif %}>
                        2º andar
                    </option>
                </select>
            </div>

            <div class="campo-form campo-descricao">
                <label for="descricao">Descrição / observação</label>
                <textarea 
                    id="descricao" 
                    name="descricao" 
                    placeholder="Ex: Chave da sala principal, armário, laboratório, coordenação..."
                >{{ chave.descricao or "" }}</textarea>
            </div>

        </div>

        <div class="acoes-form acoes-chave">
            <div>
                <button type="submit" class="btn btn-principal">
                    Salvar alterações
                </button>

                <a href="{{ url_for('chaves') }}" class="btn btn-secundario">
                    Voltar
                </a>
            </div>
        </div>

    </form>

    <form 
        method="POST"
        action="{{ url_for('excluir_chave', chave_id=chave.id) }}"
        class="form-excluir-discreto"
        onsubmit="return confirm('Tem certeza que deseja excluir esta chave?');"
    >
        <button type="submit" class="btn btn-excluir-discreto">
            Excluir chave
        </button>
    </form>

</section>

{% endblock %}
