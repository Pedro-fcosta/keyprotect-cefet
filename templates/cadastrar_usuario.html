{% extends "base.html" %}

{% block title %}Cadastrar usuário | KeyProtect{% endblock %}

{% block content %}

<section class="titulo-pagina">
    <h2>Cadastrar usuário</h2>
    <p>Inclua um aluno, professor, técnico ou funcionário autorizado a retirar chaves.</p>
</section>

<section class="form-box form-usuario-box">
    <form method="POST">

        <div class="form-grid form-grid-usuario">

            <div class="campo-form">
                <label for="matricula">Matrícula</label>
                <input 
                    type="text" 
                    id="matricula" 
                    name="matricula" 
                    placeholder="Ex: 2023123456"
                    required
                >
            </div>

            <div class="campo-form">
                <label for="nome">Nome completo</label>
                <input 
                    type="text" 
                    id="nome" 
                    name="nome" 
                    placeholder="Ex: Pedro Fernandes"
                    required
                >
            </div>

            <div class="campo-form">
                <label for="tipo_usuario">Tipo de usuário</label>
                <select id="tipo_usuario" name="tipo_usuario" required>
                    <option value="">Selecione</option>
                    <option value="Aluno">Aluno</option>
                    <option value="Professor">Professor</option>
                    <option value="Técnico">Técnico</option>
                    <option value="Funcionário">Funcionário</option>
                </select>
            </div>

            <div class="campo-form">
                <label for="telefone">Telefone</label>
                <input 
                    type="text" 
                    id="telefone" 
                    name="telefone" 
                    placeholder="Ex: (21) 99999-9999"
                    maxlength="15"
                >
            </div>

            <div class="campo-form" id="campoCursoSetor">
                <label for="curso_setor">Curso / Área</label>

                <select id="curso_setor" name="curso_setor">
                    <option value="">Selecione</option>

                    <option value="Engenharia Mecânica" data-tipo="Aluno">
                        Engenharia Mecânica
                    </option>

                    <option value="Engenharia de Produção" data-tipo="Aluno">
                        Engenharia de Produção
                    </option>

                    <option value="Técnico em Mecânica" data-tipo="Aluno">
                        Técnico em Mecânica
                    </option>

                    <option value="Técnico em Automação" data-tipo="Aluno">
                        Técnico em Automação
                    </option>

                    <option value="Ensino Superior" data-tipo="Professor">
                        Ensino Superior
                    </option>

                    <option value="Ensino Técnico" data-tipo="Professor">
                        Ensino Técnico
                    </option>
                </select>
            </div>

            <div class="campo-form">
                <label for="pin">PIN de 4 dígitos</label>
                <input 
                    type="password" 
                    id="pin" 
                    name="pin" 
                    placeholder="Ex: 1234"
                    maxlength="4"
                    pattern="[0-9]{4}"
                    inputmode="numeric"
                    required
                >
            </div>

            <div class="campo-form">
                <label for="confirmar_pin">Confirmar PIN</label>
                <input 
                    type="password" 
                    id="confirmar_pin" 
                    name="confirmar_pin" 
                    placeholder="Digite novamente o PIN"
                    maxlength="4"
                    pattern="[0-9]{4}"
                    inputmode="numeric"
                    required
                >
            </div>

        </div>

        <div class="acoes-form">
            <button type="submit" class="btn btn-principal">Cadastrar usuário</button>
            <a href="{{ url_for('usuarios') }}" class="btn btn-secundario">Voltar</a>
        </div>

    </form>
</section>

<script>
    const tipoUsuario = document.getElementById("tipo_usuario");
    const campoCursoSetor = document.getElementById("campoCursoSetor");
    const cursoSetor = document.getElementById("curso_setor");
    const opcoesCursoSetor = Array.from(cursoSetor.options);

    function atualizarCampoCursoSetor() {
        const tipo = tipoUsuario.value;

        cursoSetor.value = "";

        opcoesCursoSetor.forEach((opcao) => {
            if (opcao.value === "") {
                opcao.hidden = false;
                return;
            }

            const tipoDaOpcao = opcao.dataset.tipo;
            opcao.hidden = tipoDaOpcao !== tipo;
        });

        if (tipo === "Aluno") {
            campoCursoSetor.style.display = "flex";
            cursoSetor.disabled = false;
            cursoSetor.required = true;
        } else if (tipo === "Professor") {
            campoCursoSetor.style.display = "flex";
            cursoSetor.disabled = false;
            cursoSetor.required = true;
        } else if (tipo === "Técnico" || tipo === "Funcionário") {
            campoCursoSetor.style.display = "none";
            cursoSetor.disabled = true;
            cursoSetor.required = false;
            cursoSetor.value = "";
        } else {
            campoCursoSetor.style.display = "flex";
            cursoSetor.disabled = false;
            cursoSetor.required = false;
        }
    }

    tipoUsuario.addEventListener("change", atualizarCampoCursoSetor);
    atualizarCampoCursoSetor();
</script>

{% endblock %}
