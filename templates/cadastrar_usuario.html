{% extends "base.html" %}

{% block title %}Cadastrar usuário | Guardião de Chaves{% endblock %}

{% block content %}

<section class="titulo-pagina">
    <h2>Cadastrar usuário</h2>
    <p>Inclua um aluno, professor, técnico ou funcionário autorizado a retirar chaves.</p>
</section>

<section class="form-box form-usuario-box">
    <form method="POST">

        <div class="form-grid form-grid-usuario">

            <div class="campo-form">
                <label for="matricula">Matrícula</label>
                <input 
                    type="text" 
                    id="matricula" 
                    name="matricula" 
                    placeholder="Ex: 2023123456"
                    required
                >
            </div>

            <div class="campo-form">
                <label for="nome">Nome completo</label>
                <input 
                    type="text" 
                    id="nome" 
                    name="nome" 
                    placeholder="Ex: Pedro Fernandes"
                    required
                >
            </div>

            <div class="campo-form">
                <label for="tipo_usuario">Tipo de usuário</label>
                <select id="tipo_usuario" name="tipo_usuario" required>
                    <option value="">Selecione</option>
                    <option value="Aluno">Aluno</option>
                    <option value="Professor">Professor</option>
                    <option value="Técnico">Técnico</option>
                    <option value="Funcionário">Funcionário</option>
                </select>
            </div>

            <div class="campo-form">
                <label for="telefone">Telefone</label>
                <input 
                    type="text" 
                    id="telefone" 
                    name="telefone" 
                    placeholder="Ex: (21) 99999-9999"
                    maxlength="15"
                >
            </div>

            <div class="campo-form">
                <label for="curso_setor">Curso/Área</label>
                <input 
                    type="text" 
                    id="curso_setor" 
                    name="curso_setor" 
                    placeholder="Ex: Engenharia Mecânica"
                >
            </div>

            <div class="campo-form">
                <label for="pin">PIN de 4 dígitos</label>
                <input 
                    type="password" 
                    id="pin" 
                    name="pin" 
                    placeholder="Ex: 1234"
                    maxlength="4"
                    pattern="[0-9]{4}"
                    required
                >
            </div>

            <div class="campo-form">
                <label for="confirmar_pin">Confirmar PIN</label>
                <input 
                    type="password" 
                    id="confirmar_pin" 
                    name="confirmar_pin" 
                    placeholder="Digite novamente o PIN"
                    maxlength="4"
                    pattern="[0-9]{4}"
                    required
                >
            </div>

        </div>

        <div class="acoes-form">
            <button type="submit" class="btn btn-principal">Cadastrar usuário</button>
            <a href="{{ url_for('usuarios') }}" class="btn btn-secundario">Voltar</a>
        </div>

    </form>
</section>

<script>
    const tipoUsuario = document.getElementById("tipo_usuario");
    const cursoSetor = document.getElementById("curso_setor");

    tipoUsuario.addEventListener("change", function () {
        if (this.value === "Aluno") {
            cursoSetor.placeholder = "Ex: Engenharia Mecânica";
            cursoSetor.disabled = false;
        } else if (this.value === "Professor") {
            cursoSetor.placeholder = "Ex: Ensino Superior ou Ensino Técnico";
            cursoSetor.disabled = false;
        } else if (this.value === "Técnico" || this.value === "Funcionário") {
            cursoSetor.value = "";
            cursoSetor.placeholder = "Não necessário";
            cursoSetor.disabled = true;
        } else {
            cursoSetor.placeholder = "Ex: Engenharia Mecânica";
            cursoSetor.disabled = false;
        }
    });
</script>

{% endblock %}
